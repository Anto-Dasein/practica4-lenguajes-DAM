<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript y el DOM: write y className</title>
    <style>
        .importante {
            background-color: red;
            color: yellow;
            font-size: 30px;
        }
    </style>
    <script>
        function aplicarClase(){
            document.getElementById("titulo").className = "importante";
        }
    </script>
</head>
<body>
    <h1 id="titulo">Título inicial</h1>
    <button onclick="aplicarClase()">Aplicar clase</button>
</body>
</html>
