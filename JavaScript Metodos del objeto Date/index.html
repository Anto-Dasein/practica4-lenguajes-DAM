<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métodos de las fechas (Dates)</title>
    <script>
        function procesaFecha(){
            var fechaStr = document.getElementById("fecha").value;
            var fechaDate = new Date(fechaStr);
            var diaMes = fechaDate.getDate();
            var diaSemana = fechaDate.getDay();
            alert("Día del mes: " + diaMes + "\nDía de la semana: " + diaSemana);
            var mes = fechaDate.getMonth();
            var año = fechaDate.getFullYear();
            alert("Mes: " + mes + "\nAño: " + año);
        }
    </script>
</head>
<body>
    <h1>Métodos para Fechas</h1>
    <label for="fecha">Fecha:</label>
    <input type="date" name="fecha" id="fecha"><br>
    <button onclick="procesaFecha()">Procesa Fecha</button>
</body>
</html>
