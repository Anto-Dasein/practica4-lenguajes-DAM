<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM y JavaScript</title>
    <style>
        #caja {
            border:3px solid blue;
            padding: 20px;
            width:300px;
        }
    </style>
    <script>
        function cambiaTitulo(){
            var titulo = document.getElementById("titulo");
            if (titulo.innerHTML == "Título inicial de la página") {
                titulo.innerHTML = "Nuevo título";
            } else {
                titulo.innerHTML = "Título inicial de la página";
            }
            document.getElementById("caja").innerHTML = "Nuevo contenido.";
        }
        function cambiaAnchoImagen(){
            var imagen = document.getElementById("imagen");
            imagen.width = imagen.width + 100;
        }
        function cambiaSrc(){
            document.getElementById("imagen").src = "images/escudo2.jpg";
        }
        function cambiaCaja (){
            var caja = document.getElementById("caja");
            caja.style.width = '500px';
            caja.style.backgroundColor = 'lightgreen';
            caja.style.fontSize = '50px';
            caja.style.color = 'red'; 
        }
    </script>
</head>
<body>
    <h1 id="titulo">Título inicial de la página</h1>
    <div id="caja">Contenido de la caja</div>
    <img id="imagen" src="images/escudo1.jpg"
    width="200" height="300">
    <br>
    <button onclick="cambiaTitulo()">Cambiar Título</button>
    <button onclick="cambiaAnchoImagen()">Cambiar ancho imagen</button>
    <button onclick="cambiaSrc()">Cambiar imagen</button>
    <button onclick="cambiaCaja()">Cambiar caja</button>
</body>
</html>
